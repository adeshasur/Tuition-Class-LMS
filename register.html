<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuition Hub - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Space Grotesk', 'sans-serif'] },
                boxShadow: {
                        'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
                        'soft-lg': '0 10px 40px -10px rgba(0, 0, 0, 0.1), 0 20px 25px -5px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
        }
        
        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ffffff 0%, #e5e5e5 100%);
            color: #000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
            transition: left 0.5s;
        }
        
        .btn-primary:hover:not(:disabled)::before {
            left: 100%;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.15);
        }
        
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        .fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        
        .error-shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }
        
        @keyframes shake {
            10%, 90% { transform: translateX(-1px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-glow {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.3) !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">
    <div class="floating-orb w-96 h-96 bg-white top-1/4 -left-48" style="animation-delay: 0s;"></div>
    <div class="floating-orb w-64 h-64 bg-white/50 bottom-1/4 -right-32" style="animation-delay: -5s;"></div>
    <div class="floating-orb w-48 h-48 bg-white/30 top-1/2 left-1/2" style="animation-delay: -10s;"></div>

    <div class="relative w-full max-w-lg">
        <div class="glass-card rounded-3xl shadow-soft-lg p-10 fade-up">
            <div class="text-center mb-10 fade-up stagger-1">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl mb-6 shadow-soft">
                    <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5L12 11.25L5 7.5M12 21V11.25M12 21L19 17.25V7.5L12 3.75L5 7.5V17.25L12 21Z"/>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight mb-2">New Student Registration</h1>
                <p class="text-white/50 text-sm">Join our learning community today</p>
            </div>

            <form id="register-form" class="space-y-5 fade-up stagger-2">
                <div class="space-y-2">
                    <label class="block text-xs font-medium text-white/60 uppercase tracking-wider mb-2">Full Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <input type="text" id="name" required placeholder="Enter your full name" 
                               class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl outline-none text-white text-base placeholder-white/30">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-medium text-white/60 uppercase tracking-wider mb-2">Mobile Number</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                        </div>
                        <input type="tel" id="mobile" required placeholder="07XXXXXXXX" maxlength="10" pattern="[0-9]{10}"
                               class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl outline-none text-white text-base placeholder-white/30">

                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-xs font-medium text-white/60 uppercase tracking-wider mb-2">PIN Code</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                </svg>
                            </div>
                            <input type="password" id="pin" required maxlength="4" placeholder="••••" 
                                   class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl outline-none text-white text-xl text-center tracking-[0.3em] placeholder-white/30">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-medium text-white/60 uppercase tracking-wider mb-2">Confirm PIN</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                                </svg>
                            </div>
                            <input type="password" id="confirm-pin" required maxlength="4" placeholder="••••" 
                                   class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl outline-none text-white text-xl text-center tracking-[0.3em] placeholder-white/30">
                        </div>
                    </div>
                </div>

                <div id="status-msg" class="hidden p-4 rounded-xl border">
                    <div class="flex items-center gap-3">
                        <div id="status-icon"></div>
                        <span id="status-text" class="text-sm"></span>
                    </div>
                </div>

                <button type="submit" id="register-btn"
                        class="btn-primary w-full py-4 rounded-xl font-semibold text-lg flex items-center justify-center gap-3 mt-6">
                    <span>Create Account</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                    </svg>
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-white/10 text-center fade-up stagger-3">
                <p class="text-white/40 text-sm">
                    Already have an account? 
                    <a href="index.html" class="text-white/80 hover:text-white transition-colors font-medium">Sign In</a>
                </p>
            </div>
        </div>

        <p class="text-center text-white/30 text-xs mt-8">
            © 2024 Tuition Hub. Secure Student Enrollment.
        </p>
    </div>

    <script type="module">
        import { signup } from './js/auth.js';

        const form = document.getElementById('register-form');
        const registerBtn = document.getElementById('register-btn');
        const statusMsg = document.getElementById('status-msg');
        const statusText = document.getElementById('status-text');
        const statusIcon = document.getElementById('status-icon');

        function showMessage(text, type = 'error') {
            statusMsg.classList.remove('hidden', 'bg-white/5', 'border-white/10', 'bg-green-500/10', 'border-green-500/20', 'error-shake');
            statusText.classList.remove('text-white/80', 'text-green-400');
            
            if (type === 'error') {
                statusMsg.classList.add('bg-white/5', 'border-white/10', 'error-shake');
                statusText.classList.add('text-white/80');
                statusIcon.innerHTML = `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
                setTimeout(() => statusMsg.classList.remove('error-shake'), 500);
            } else {
                statusMsg.classList.add('bg-green-500/10', 'border-green-500/20', 'success-glow');
                statusText.classList.add('text-green-400');
                statusIcon.innerHTML = `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`;
            }
            
            statusText.textContent = text;
            statusMsg.classList.remove('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            const pin = document.getElementById('pin').value;
            const confirmPin = document.getElementById('confirm-pin').value;

            if (mobile.length !== 10) {
                showMessage('Mobile number must be exactly 10 digits');
                return;
            }


            if (pin !== confirmPin) {
                showMessage('PINs do not match');
                return;
            }

            if (pin.length !== 4) {
                showMessage('PIN must be 4 digits');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerHTML = `<div class="spinner mx-auto"></div>`;
            statusMsg.classList.add('hidden');

            const result = await signup(name, mobile, pin);

            if (result.success) {
                registerBtn.innerHTML = `
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                `;
                showMessage('Registration successful! Please contact admin to activate your account.', 'success');
                form.reset();
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            } else {
                showMessage(result.error);
                registerBtn.disabled = false;
                registerBtn.innerHTML = `
                    <span>Create Account</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                    </svg>
                `;
            }
        });
    </script>
</body>
</html>
